<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Couture Classics — Order History</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:         #080808;
    --black-2:       #0f0f0f;
    --black-3:       #161616;
    --white:         #f8f4ef;
    --gold:          #c9a96e;
    --gold-light:    #e2c99a;
    --gold-dim:      rgba(201,169,110,0.12);
    --border:        rgba(201,169,110,0.22);
    --border-bright: rgba(201,169,110,0.5);
  }

  body {
    background-color: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background-color: rgba(8, 8, 8, 0.9);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .nav-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }

  .nav-actions {
    display: flex;
    gap: 24px;
  }

  .nav-icon-link {
    color: var(--white);
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .nav-icon-link:hover { opacity: 1; }

  main {
    flex: 1;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 50px 20px;
  }

  .page-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 36px;
  }

  .title-group h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }
  .title-group p {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-top: 4px;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
  }

  .tab-btn {
    background: none;
    border: 1px solid transparent;
    color: rgba(248, 244, 239, 0.45);
    padding: 8px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active { border-color: var(--gold); color: var(--gold-light); background-color: var(--gold-dim); }

  .order-card {
    background-color: var(--black-2);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
  }
  .card-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(201,169,110,0.1);
    padding-bottom: 14px;
    margin-bottom: 18px;
  }
  .meta-grid { display: flex; gap: 40px; font-size: 0.8rem; }
  .meta-block h4 {
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: rgba(248, 244, 239, 0.4);
    margin-bottom: 4px;
  }
  .meta-block p { font-weight: 500; }

  .status-badge {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 2px;
    font-weight: 500;
  }
  .status-badge.transit { background-color: rgba(201, 169, 110, 0.15); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.3); }
  .status-badge.complete { background-color: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }

  .item-row-entry {
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(248,244,239,0.04);
  }
  .item-row-entry:last-of-type { border-bottom: none; margin-bottom: 12px; }
  
  .prod-thumb {
    width: 60px; height: 75px;
    object-fit: cover;
    background-color: var(--black-3);
    border: 1px solid var(--border);
  }
  .entry-details h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; }
  .entry-details p { font-size: 0.8rem; color: rgba(248,244,239,0.4); margin-top: 2px; }

  .card-action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(248,244,239,0.04);
  }
  .action-links-group { display: flex; gap: 16px; }
  .action-btn {
    background: none; border: none; color: var(--white); font-size: 0.8rem;
    cursor: pointer; opacity: 0.6; padding: 4px 0; border-bottom: 1px solid transparent;
    transition: all 0.2s;
  }
  .action-btn:hover { opacity: 1; border-color: var(--white); }
  
  .invoice-download-btn {
    background: none; border: 1px solid var(--border); color: var(--gold-light);
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .invoice-download-btn:hover { background-color: var(--gold); color: var(--black); border-color: var(--gold); }

  footer {
    background-color: var(--black-2);
    border-top: 1px solid var(--border);
    padding: 40px 20px;
    margin-top: auto;
  }
  .footer-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .footer-links { display: flex; gap: 30px; list-style: none; }
  .footer-links a { color: rgba(248,244,239,0.4); text-decoration: none; font-size: 0.78rem; transition: color 0.2s; }
  .footer-links a:hover { color: var(--white); }
</style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="shipping.html" class="logo">Couture Classics</a>
      <div class="nav-actions">
        <a href="shipping.html" class="nav-icon-link" title="Collection Shop Storefront">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header-row">
      <div class="title-group">
        <h1>Order History</h1>
        <p>Atelier Fulfillment Ledger</p>
      </div>
      <div class="filter-tabs">
        <button class="tab-btn active" onclick="switchFilter('all', this)">All orders</button>
        <button class="tab-btn" onclick="switchFilter('transit', this)">In Transit</button>
        <button class="tab-btn" onclick="switchFilter('complete', this)">Completed</button>
      </div>
    </div>

    <div id="ordersContainer"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <p>Couture Classics</p>
      </div>
      <ul class="footer-links">
        <li><a href="#">Privacy Architecture</a></li>
        <li><a href="#">Atelier Relations</a></li>
        <li><a href="#">Help Registry</a></li>
      </ul>
    </div>
  </footer>

  <script>
    let activeFilter = 'all';

    function renderOrderHistory() {
      const container = document.getElementById('ordersContainer');
      if (!container) return;

      const systemicOrders = JSON.parse(localStorage.getItem('cc_orders')) || [];

      if (systemicOrders.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px; border: 1px dashed var(--border); background: var(--black-2);">
            <p style="color: rgba(248,244,239,0.4); font-size: 0.9rem; letter-spacing: 0.05em; margin-bottom: 20px;">
              No fulfillment logs detected inside this operational session dashboard profile.
            </p>
            <a href="shipping.html" class="invoice-download-btn" style="text-decoration: none; display: inline-block;">Browse Collection Gallery</a>
          </div>`;
        return;
      }

      container.innerHTML = systemicOrders.map(order => {
        const passesFilter = activeFilter === 'all' || order.status === activeFilter;
        const displayStyle = passesFilter ? 'block' : 'none';
        const statusLabel = order.status === 'transit' ? 'In Transit' : 'Completed';
        
        const itemsHTML = order.items.map(item => `
          <div class="item-row-entry">
            <img src="${item.img}" alt="${item.name}" class="prod-thumb" onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=150&q=80'" />
            <div class="entry-details">
              <h3>${item.name}</h3>
              <p>Quantity: ${item.quantity} | Allocation: Standard Sizing</p>
            </div>
          </div>
        `).join('');

        // Action Buttons Matrix: Displays "Received Order" when the status is 'transit'
        const systemButtons = order.status === 'transit' 
          ? `<button class="action-btn" style="color: #4ade80; font-weight: 500; opacity: 1;" onclick="markOrderAsReceived('${order.id}')">Received Order</button>
             <button class="action-btn" onclick="triggerAssetTracking('${order.id}')">Track Delivery Asset</button>
             <button class="action-btn" onclick="alert('Support registry window opening for ticket ${order.id}...')">Contact Atelier</button>`
          : `<button class="action-btn" onclick="alert('Initiating return routing protocol for ${order.id}...')">Request Return / Exchange</button>
             <button class="action-btn" onclick="alert('Adding items back to operational active session bag.')">Order Again</button>`;

        return `
          <section class="order-card" data-status="${order.status}" style="display: ${displayStyle}">
            <div class="card-top-bar">
              <div class="meta-grid">
                <div class="meta-block">
                  <h4>Date Dispatched</h4>
                  <p>${order.date}</p>
                </div>
                <div class="meta-block">
                  <h4>Fulfillment ID</h4>
                  <p>${order.id}</p>
                </div>
                <div class="meta-block">
                  <h4>Total Value</h4>
                  <p>$${Number(order.value).toLocaleString()}</p>
                </div>
              </div>
              <span class="status-badge ${order.status}">${statusLabel}</span>
            </div>

            ${itemsHTML}

            <div class="card-action-row">
              <div class="action-links-group">
                ${systemButtons}
              </div>
              <button class="invoice-download-btn" onclick="alert('Generating signed cryptographic invoice invoice for ${order.id}...')">Download Invoice</button>
            </div>
          </section>
        `;
      }).join('');
    }

    // Function to confirm delivery and transition status to complete
    function markOrderAsReceived(orderId) {
      let systemicOrders = JSON.parse(localStorage.getItem('cc_orders')) || [];
      const orderIndex = systemicOrders.findIndex(order => order.id === orderId);

      if (orderIndex > -1) {
        systemicOrders[orderIndex].status = 'complete';
        localStorage.setItem('cc_orders', JSON.stringify(systemicOrders));
        alert(`Fulfillment confirmation registered for ${orderId}.\nStatus transitioned to Completed.`);
        renderOrderHistory(); // Instantly update UI structure configurations
      }
    }

    function triggerAssetTracking(orderId) {
      alert(`Asset Tracking Pipeline active.\nOrder ${orderId} is currently routing via Premium Courier.\nEstimated fulfillment resolution: 3-5 business days.`);
    }

    function switchFilter(status, element) {
      activeFilter = status;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      renderOrderHistory();
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderOrderHistory();
    });
  </script>
</body>
</html>
