<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Couture Classics — Collections</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:         #080808;
    --black-2:       #0f0f0f;
    --black-3:       #161616;
    --white:         #f8f4ef;
    --gold:          #c9a96e;
    --gold-light:    #e2c99a;
    --gold-dim:      rgba(201,169,110,0.18);
    --border:        rgba(201,169,110,0.22);
    --border-bright: rgba(201,169,110,0.5);
  }

  body {
    background-color: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* HEADER & NAVIGATION */
  header {
    background-color: rgba(8, 8, 8, 0.9);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    opacity: 0; /* Animated by GSAP */
  }

  .nav-container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    font-weight: 400;
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav-link-icon {
    color: var(--white);
    text-decoration: none;
    position: relative;
    opacity: 0.85;
    transition: opacity 0.2s, color 0.2s;
    background: none;
    border: none;
    cursor: pointer;
  }
  .nav-link-icon:hover {
    opacity: 1;
    color: var(--gold);
  }

  .cart-badge {
    position: absolute;
    top: -6px;
    right: -10px;
    background-color: var(--gold);
    color: var(--black);
    font-size: 0.65rem;
    font-weight: 700;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* STOREFRONT LAYOUT */
  main {
    flex: 1;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto;
    padding: 40px;
  }

  .page-title-section {
    text-align: center;
    margin-bottom: 48px;
  }

  /* Text Reveal Container */
  .title-mask {
    overflow: hidden;
    margin-bottom: 8px;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    transform: translateY(100px); /* Animated by GSAP */
  }

  .page-subtitle {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0; /* Animated by GSAP */
    transform: translateY(15px);
  }

  /* CONTROLS BAR */
  .controls-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 32px;
    opacity: 0; /* Animated by GSAP */
    transform: translateY(15px);
  }

  .filter-group {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    background: none;
    border: 1px solid transparent;
    color: rgba(248, 244, 239, 0.45);
    padding: 6px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.25s;
  }
  .filter-btn:hover {
    color: var(--white);
  }
  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background-color: rgba(201, 169, 110, 0.05);
  }

  .sort-select {
    background-color: var(--black-2);
    border: 1px solid var(--border);
    color: rgba(248, 244, 239, 0.7);
    padding: 6px 12px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    outline: none;
    cursor: pointer;
  }
  .sort-select:focus {
    border-color: var(--gold);
  }

  /* GRID STRUCTURE */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 40px 30px;
  }

  .product-card {
    background-color: var(--black-2);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
    opacity: 0; /* Dynamic initial state for incoming batch reveals */
    transform: translateY(40px);
  }
  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-bright);
  }

  .prod-img-wrap {
    position: relative;
    width: 100%;
    padding-top: 130%;
    background-color: #121212;
    overflow: hidden;
  }

  .prod-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }
  .product-card:hover .prod-img {
    transform: scale(1.03);
  }

  .prod-badge {
    position: absolute;
    top: 14px; left: 14px;
    background-color: var(--gold);
    color: var(--black);
    font-size: 0.62rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    z-index: 2;
  }

  .wishlist-btn {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(8, 8, 8, 0.4);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.05);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--white);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    z-index: 2;
  }
  .wishlist-btn:hover {
    background: rgba(8, 8, 8, 0.8);
    color: var(--gold);
  }

  .prod-info {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .prod-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
    color: var(--white);
  }

  .prod-desc {
    font-size: 0.78rem;
    color: rgba(248, 244, 239, 0.45);
    line-height: 1.5;
    margin-bottom: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .prod-meta {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .prod-price {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--gold-light);
  }

  .add-to-bag-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 6px 14px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }
  .add-to-bag-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background-color: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: 0;
  }
  .add-to-bag-btn:hover::before {
    transform: translateX(0);
  }
  .add-to-bag-btn:hover {
    color: var(--black);
  }
  .add-to-bag-btn span {
    position: relative;
    z-index: 1;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    background-color: var(--black-2);
    padding: 40px 0 30px;
    margin-top: 80px;
  }
  .footer-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(248, 244, 239, 0.5);
  }
  .footer-links {
    display: flex;
    gap: 30px;
    list-style: none;
  }
  .footer-links a {
    color: rgba(248, 244, 239, 0.3);
    text-decoration: none;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .footer-links a:hover {
    color: var(--gold);
  }

  /* LIVE NOTIFICATION TOAST */
  .toast {
    position: fixed;
    bottom: 30px; right: 30px;
    background-color: var(--black-3);
    border: 1px solid var(--gold);
    color: var(--white);
    padding: 12px 24px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transform: translateY(100px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
    z-index: 1000;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  @media (max-width: 768px) {
    .nav-container, .footer-inner { flex-direction: column; gap: 20px; text-align: center; }
    .controls-bar { flex-direction: column; gap: 16px; align-items: flex-start; }
    main { padding: 20px; }
  }
</style>
</head>
<body>

  <header id="mainHeader">
    <div class="nav-container">
      <a href="shipping.html" class="logo">Couture Classics</a>
      <div class="nav-actions">
        <a href="order.html" class="nav-link-icon" title="View Order History Ledger">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </a>

        <a href="Couture Classics – Sign In.html" class="nav-link-icon">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
          </svg>
        </a>
        <a href="cart.html" class="nav-link-icon">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="page-title-section">
      <div class="title-mask"><h1 class="page-title" id="pageTitle">The Atelier Archive</h1></div>
      <p class="page-subtitle" id="pageSubtitle">Curated Luxury Architecture</p>
    </div>

    <div class="controls-bar" id="controlsBar">
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterProducts('all', this)">All Creations</button>
        <button class="filter-btn" onclick="filterProducts('men', this)">Homme</button>
        <button class="filter-btn" onclick="filterProducts('women', this)">Femme</button>
        <button class="filter-btn" onclick="filterProducts('new', this)">New Arrivals</button>
      </div>
      <select class="sort-select" onchange="sortProducts(this.value)">
        <option value="default">Default Sort</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>

    <div class="products-grid" id="productsGrid"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <p>Couture Classics</p>
      </div>
      <ul class="footer-links">
        <li><a href="#">Privacy Architecture</a></li>
        <li><a href="#">Atelier Relations</a></li>
        <li><a href="#">Help Registry</a></li>
      </ul>
    </div>
  </footer>

  <div class="toast" id="toast">Item added to bag</div>

  <!-- --- GSAP CORE ANIMATION ENGINE & SCROLLTRIGGER --- -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
// --- STATE & PAGINATION MANAGEMENT ---
let products = [];            // Raw database storage
let filteredProducts = [];    // Filtered/sorted collection pool
let currentFilter = 'all';
let currentSort = 'default';
let wishlisted = new Set();

const ITEMS_PER_PAGE = 8;     // Control pagination chunk sizes
let currentPage = 1;
let infiniteObserver = null;  // Keeps track of runtime layout listeners

updateCartBadge();

// Initialize GSAP Core Intro Timelines on DOM load
document.addEventListener("DOMContentLoaded", () => {
  gsap.registerPlugin(ScrollTrigger);

  const introTimeline = gsap.timeline({ defaults: { ease: "power4.out" } });
  
  introTimeline.to("#pageTitle", { y: 0, duration: 1.2, delay: 0.1 })
               .to("#pageSubtitle", { opacity: 1, y: 0, duration: 0.8 }, "-=0.9")
               .to("#controlsBar", { opacity: 1, y: 0, duration: 0.8 }, "-=0.7")
               .to("#mainHeader", { opacity: 1, duration: 0.6 }, "-=0.8");
});

// --- CORE DATA STREAM PIPELINES ---
async function fetchLiveProducts() {
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000'
      : ''; // Relative routing toggle for active production environments

  try {
    // Attempt 1: Sync inventory directly via our Vercel Serverless Function architecture
    const response = await fetch(`${API_BASE}/api/products`);
    if (!response.ok) {
      throw new Error("Database connectivity or endpoint timeout condition encountered.");
    }
    products = await response.json();
    processCatalogUpdate();
    
  } catch (error) {
    console.warn("Express context uncontactable. Engaging static client backup protocol...", error.message);
    
    // Attempt 2: Emergency client-side browser fallback directly to root products.json file mapping
    try {
      const fallbackResponse = await fetch('./products.json');
      if (!fallbackResponse.ok) {
        throw new Error("Root static products backup descriptor missing or unreadable.");
      }
      const fallbackData = await fallbackResponse.json();
      
      // Map static attributes safely to normalize incoming frontend structure keys
      products = fallbackData.map(p => ({
        id: p.Product_ID || p.id,
        name: p.Name || p.name,
        category: (p.Category || p.category || 'Women').toLowerCase(),
        detail: p.Detail || p.detail || p.Description,
        price: p.Price || p.price,
        img: p.Img_Url || p.Img_URL || p.img_url || p.Img_url || "",
        badge: p.Badge || p.badge || null
      }));
      
      showToast("Viewing archive collection (offline mode).");
      processCatalogUpdate();
      
    } catch (fallbackError) {
      console.error("Critical Failure: UI mapping data channels fully broken.", fallbackError);
      showToast("Error connecting to inventory database.");
    }
  }
}

// Reset view completely when user switches filters or sorting layers
function processCatalogUpdate() {
  currentPage = 1;
  
  // Safely sever any existing layout observer connections
  if (infiniteObserver) {
    infiniteObserver.disconnect();
    infiniteObserver = null;
  }
  
  // Wipe out DOM grid container before processing a fresh load
  const grid = document.getElementById('productsGrid');
  if (grid) grid.innerHTML = '';

  // Filter and sort total global cached state array
  filteredProducts = getFilteredAndSortedList();
  
  // Fire first row batch render
  loadNextProductBatch();
}

// Slices data rows and drops them to grid safely
function loadNextProductBatch() {
  const grid = document.getElementById('productsGrid');
  if (!grid || filteredProducts.length === 0) return;

  const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, filteredProducts.length);
  
  const batch = filteredProducts.slice(startIndex, endIndex);
  if (batch.length === 0) return;

  // Use a temporary wrapper element to create real HTML node objects out of text
  const tempContainer = document.createElement('div');
  
  tempContainer.innerHTML = batch.map(p => {
    const pImg = p.img || p.Img_Url || p.Img_url || p.IMG_URL || '';
    const pId = p.id || p.Product_ID || p.product_id || Math.random();
    const pName = p.name || p.Name || p.Product_Name || 'Luxury Apparel';
    const pDetail = p.detail || p.Description || p.category || '';
    const pPrice = p.price || p.Price || 0;
    const pBadge = p.badge || p.Badge || null;
    const wished = wishlisted.has(pId);

    const safeName = pName.replace(/'/g, "\\'");
    const safeImg = pImg.replace(/'/g, "\\'");

    return `
    <article class="product-card" data-id="${pId}">
      <div class="prod-img-wrap">
        <img class="prod-img" src="${pImg}" alt="${pName}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=600&q=80'"/>
        ${pBadge ? `<span class="prod-badge">${pBadge}</span>` : ''}
        <button class="wishlist-btn" onclick="toggleWishlist(event, '${pId}')" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" fill="${wished ? 'var(--gold)' : 'none'}" stroke="${wished ? 'var(--gold)' : 'currentColor'}" stroke-width="1.2" id="heart-${pId}">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>
      <div class="prod-info">
        <h2 class="prod-title">${pName}</h2>
        <p class="prod-desc">${pDetail}</p>
        <div class="prod-meta">
          <span class="prod-price">$${pPrice}</span>
          <button class="add-to-bag-btn" onclick="addToCart(event, '${pId}', '${safeName}', ${pPrice}, '${safeImg}')"><span>Add to Bag</span></button>
        </div>
      </div>
    </article>`;
  }).join('');

  // Transform text string nodes into real elements and append smoothly to layout grid
  const newNodes = Array.from(tempContainer.children);
  newNodes.forEach(node => grid.appendChild(node));

  // Run the premium fluid reveal timeline specifically for the freshly appended items
  animateIncomingBatch(newNodes);

  // Setup infinite scroll interception mapping on the last card in this slice
  if (endIndex < filteredProducts.length) {
    currentPage++;
    setupInfiniteScrollTrigger(grid.lastElementChild);
  }
}

// --- MOTION INTERACTION ENGINE ---
function animateIncomingBatch(elements) {
  // Set pristine initial position constraints outside styles
  gsap.set(elements, { opacity: 0, y: 40 });

  // Expose fluid reveal timeline dynamically as user encounters elements
  gsap.to(elements, {
    opacity: 1,
    y: 0,
    duration: 1.1,
    ease: "power3.out",
    stagger: 0.08,
    clearProps: "transform", // Clears runtime CSS modifications to allow native hover properties
    scrollTrigger: {
      trigger: elements[0],
      start: "top 95%"
    }
  });
}

// High performance dynamic window point boundary interception tracker
function setupInfiniteScrollTrigger(targetCard) {
  if (infiniteObserver) infiniteObserver.disconnect();

  infiniteObserver = new IntersectionObserver((entries) => {
    // Check if the final node entry point reaches user view thresholds
    if (entries[0].isIntersecting) {
      infiniteObserver.disconnect(); // Clear target hook context tracking to protect rendering iterations
      loadNextProductBatch();
    }
  }, {
    rootMargin: "0px 0px 400px 0px" // Trigger loads 400px early for completely transparent flow continuity
  });

  infiniteObserver.observe(targetCard);
}

// --- SYSTEM TRANSFORM LOGIC LAYERS ---
function getFilteredAndSortedList() {
  let list = currentFilter === 'all' ? [...products] : products.filter(p => {
    const cat = (p.category || p.Category || '').toLowerCase();
    const bdg = (p.badge || p.Badge || '').toLowerCase();
    const oldP = p.oldPrice || p.Old_Price || null;

    if (currentFilter === 'sale') return oldP !== null;
    if (currentFilter === 'new') return bdg === 'new in' || bdg === 'new arrival';
    return cat === currentFilter;
  });

  if (currentSort === 'price-asc') list.sort((a,b) => (a.price || a.Price) - (b.price || b.Price));
  if (currentSort === 'price-desc') list.sort((a,b) => (b.price || b.Price) - (a.price || a.Price));
  return list;
}

function filterProducts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  processCatalogUpdate();
}

function sortProducts(val) {
  currentSort = val;
  processCatalogUpdate();
}

// --- MODULES FOR BASKET & INTEREST REGS ---
function addToCart(e, id, name, price, img) {
  e.stopPropagation();

  const currentUser = localStorage.getItem('cc_user');
  if (!currentUser) {
    showToast('Please sign in to access your bag.');
    setTimeout(() => {
      window.location.href = 'Couture Classics – Sign In.html';
    }, 1800);
    return;
  }

  let cart = JSON.parse(localStorage.getItem('cc_cart')) || [];
  const existingItemIndex = cart.findIndex(item => item.id === id);

  if (existingItemIndex > -1) {
    cart[existingItemIndex].quantity += 1;
  } else {
    cart.push({
      id: id,
      name: name,
      price: price,
      img: img,
      quantity: 1
    });
  }

  localStorage.setItem('cc_cart', JSON.stringify(cart));
  updateCartBadge();
  showToast(`${name} — added to bag`);
}

function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('cc_cart')) || [];
  const totalItems = cart.reduce((total, item) => total + item.quantity, 0);
  const badge = document.getElementById('cartCount');
  if (badge) badge.textContent = totalItems;
}

function toggleWishlist(e, id) {
  e.stopPropagation();
  const svg = document.getElementById(`heart-${id}`);
  if (!svg) return;
  if (wishlisted.has(id)) {
    wishlisted.delete(id);
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    showToast('Removed from wishlist');
  } else {
    wishlisted.add(id);
    svg.setAttribute('fill','var(--gold)');
    svg.setAttribute('stroke','var(--gold)');
    showToast('Added to wishlist');
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// Fire runtime catalog initialization tracking routines
fetchLiveProducts();
</script>
